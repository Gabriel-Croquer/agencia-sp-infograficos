<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roubos no centro de SP - Serie Historica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: auto;
      overflow: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFFFFF;
      color: #1D1D1B;
      display: flex;
      justify-content: center;
      padding: 20px 20px 10px;
    }

    .chart-container {
      width: 100%;
      max-width: 960px;
    }

    .chart-title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: #1D1D1B;
    }

    .chart-title .destaque {
      color: #0B9247;
    }

    .chart-subtitle {
      font-size: 17px;
      font-weight: 400;
      color: #666;
      line-height: 1.4;
      margin-bottom: 24px;
    }

    .chart-area {
      position: relative;
      width: 100%;
    }

    .chart-area svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .chart-source {
      font-size: 14px;
      color: #808080;
      margin-top: 12px;
    }

    .bar-rect {
      cursor: pointer;
      transition: opacity 0.2s ease;
    }

    .bar-rect:hover {
      opacity: 0.75;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #1D1D1B;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      line-height: 1.5;
      white-space: pre-line;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 10;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .logo-container {
      text-align: center;
      margin-top: 24px;
    }

    .logo-container img {
      height: 40px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 600px) {
      .chart-title { font-size: 22px; }
      .chart-subtitle { font-size: 14px; }
    }
  </style>
</head>

(function () {
  var NS = "http://www.w3.org/2000/svg";

  document.getElementById("chartTitle").innerHTML = CONFIG.titulo;
  document.getElementById("chartSubtitle").textContent = CONFIG.subtitulo;
  document.getElementById("chartSource").textContent = CONFIG.fonte;
  document.getElementById("tableCaption").textContent =
    CONFIG.titulo.replace(/<[^>]*>/g, "");

  document.querySelectorAll(".destaque").forEach(function (el) {
    el.style.color = CONFIG.cor_destaque;
  });

  var dados = CONFIG.dados;
  var n = dados.length;
  var svgWidth = 960;
  var svgHeight = 480;
  var marginTop = 20;
  var marginRight = 20;
  var marginBottom = 70;
  var marginLeft = 50;
  var plotW = svgWidth - marginLeft - marginRight;
  var plotH = svgHeight - marginTop - marginBottom;

  var maxVal = 1100;
  var yTicks = [0, 200, 400, 600, 800, 1000];

  function yScale(v) {
    return marginTop + plotH - (v / maxVal) * plotH;
  }

  var barPadding = 0.2;
  var totalBarSlot = plotW / n;
  var barWidth = totalBarSlot * (1 - barPadding);
  var barGap = totalBarSlot * barPadding;

  function xBar(i) {
    return marginLeft + i * totalBarSlot + barGap / 2;
  }

  var svg = document.createElementNS(NS, "svg");
  svg.setAttribute("viewBox", "0 0 " + svgWidth + " " + svgHeight);
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "Grafico de barras verticais: roubos no centro de SP");
  svg.setAttribute("preserveAspectRatio", "xMidYMid meet");

  // Grid lines + Y labels
  yTicks.forEach(function (tick) {
    var y = yScale(tick);

    var line = document.createElementNS(NS, "line");
    line.setAttribute("x1", marginLeft);
    line.setAttribute("x2", svgWidth - marginRight);
    line.setAttribute("y1", y);
    line.setAttribute("y2", y);
    line.setAttribute("stroke", "#E5E5E5");
    line.setAttribute("stroke-width", "1");
    svg.appendChild(line);

    var text = document.createElementNS(NS, "text");
    text.setAttribute("x", marginLeft - 10);
    text.setAttribute("y", y + 4);
    text.setAttribute("text-anchor", "end");
    text.setAttribute("font-family", "Montserrat, sans-serif");
    text.setAttribute("font-size", "14");
    text.setAttribute("fill", "#808080");
    text.textContent = tick === 0 ? "0" : tick.toLocaleString("pt-BR");
    svg.appendChild(text);
  });

  // Tooltip
  var tooltipEl = document.getElementById("tooltip");
  var chartArea = document.getElementById("chartArea");

  function formatNumber(v) {
    return v.toLocaleString("pt-BR");
  }

  function showTooltip(evt, d) {
    var rect = chartArea.getBoundingClientRect();
    var x = evt.clientX - rect.left + 12;
    var y = evt.clientY - rect.top - 40;
    if (x + 160 > rect.width) x = x - 180;
    tooltipEl.style.left = x + "px";
    tooltipEl.style.top = y + "px";
    tooltipEl.innerHTML = d.label + "\nRoubos: " + formatNumber(d.valor);
    tooltipEl.classList.add("visible");
  }

  function hideTooltip() {
    tooltipEl.classList.remove("visible");
  }

  // Bars
  var bars = [];
  dados.forEach(function (d, i) {
    var cor = d.reducao ? CONFIG.cor_destaque : CONFIG.cor_barra_normal;
    var barH = (d.valor / maxVal) * plotH;
    var x = xBar(i);
    var y = yScale(d.valor);

    var rect = document.createElementNS(NS, "rect");
    rect.setAttribute("class", "bar-rect");
    rect.setAttribute("x", x);
    rect.setAttribute("width", barWidth);
    rect.setAttribute("rx", "2");
    rect.setAttribute("ry", "2");
    rect.setAttribute("fill", cor);
    rect.setAttribute("aria-label", d.label + ": " + formatNumber(d.valor));

    rect.setAttribute("y", yScale(0));
    rect.setAttribute("height", 0);

    rect.addEventListener("mousemove", function (e) { showTooltip(e, d); });
    rect.addEventListener("mouseleave", hideTooltip);

    svg.appendChild(rect);
    bars.push({ el: rect, targetY: y, targetH: barH });

    // X-axis label
    var text = document.createElementNS(NS, "text");
    var labelX = x + barWidth / 2;
    var labelY = yScale(0) + 14;
    text.setAttribute("x", labelX);
    text.setAttribute("y", labelY);
    text.setAttribute("text-anchor", "end");
    text.setAttribute("font-family", "Montserrat, sans-serif");
    text.setAttribute("font-size", "11");
    text.setAttribute("fill", d.reducao ? "#808080" : "#FF161F");
    text.setAttribute("font-weight", d.reducao ? "400" : "700");
    text.setAttribute("transform", "rotate(-55 " + labelX + " " + labelY + ")");
    text.textContent = d.label;
    svg.appendChild(text);
  });

  document.getElementById("chartArea").insertBefore(svg, tooltipEl);

  // Animation
  requestAnimationFrame(function () {
    setTimeout(function () {
      bars.forEach(function (b, i) {
        setTimeout(function () {
          b.el.style.transition = "y 0.5s ease, height 0.5s ease";
          b.el.setAttribute("y", b.targetY);
          b.el.setAttribute("height", b.targetH);
        }, i * 40);
      });
    }, 100);
  });

  // Accessible table
  var tbody = document.getElementById("tableBody");
  dados.forEach(function (d) {
    var tr = document.createElement("tr");
    var tdLabel = document.createElement("td");
    tdLabel.textContent = d.label;
    var tdValor = document.createElement("td");
    tdValor.textContent = formatNumber(d.valor);
    tr.appendChild(tdLabel);
    tr.appendChild(tdValor);
    tbody.appendChild(tr);
  });
})();
</script>

<script>
// Auto-resize: envia altura real para o iframe pai (como Flourish)
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ sentinel: 'agencia-sp', type: 'resize', height: h }, '*');
}
window.addEventListener('load', notifyHeight);
window.addEventListener('resize', notifyHeight);
// Fallback apos animacao
setTimeout(notifyHeight, 2500);
</script>
