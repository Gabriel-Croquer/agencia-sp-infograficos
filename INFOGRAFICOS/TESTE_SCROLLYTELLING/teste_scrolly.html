<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrollytelling Mapa - Agencia SP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://unpkg.com/scrollama"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFFFFF;
      color: #1D1D1B;
      padding: 20px 20px 10px;
    }

    .scrolly-container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }

    .scrolly-header {
      max-width: 700px;
      margin-bottom: 24px;
    }

    .chart-title {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 8px;
      color: #1D1D1B;
    }

    .chart-title .destaque {
      color: #0B9247;
    }

    .chart-subtitle {
      font-size: 15px;
      font-weight: 400;
      color: #666;
      line-height: 1.5;
      margin-bottom: 0;
    }

    /* === SCROLLY LAYOUT === */
    .scrolly {
      display: flex;
      position: relative;
    }

    .scrolly__map {
      flex: 0 0 58%;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px 16px;
    }

    .map-area {
      width: 100%;
      position: relative;
    }

    .map-area svg {
      width: 100%;
      height: auto;
      display: block;
    }

    .map-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
      justify-content: center;
      min-height: 24px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: #666;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 2px;
      border: 1px solid #ddd;
    }

    .scrolly__text {
      flex: 0 0 42%;
      padding: 0 20px;
    }

    .step {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 32px 0;
      opacity: 0.25;
      transition: opacity 0.4s ease;
    }

    .step.is-active {
      opacity: 1;
    }

    .step:first-child {
      margin-top: 30vh;
    }

    .step:last-child {
      margin-bottom: 40vh;
    }

    .step h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1D1D1B;
      margin-bottom: 12px;
      line-height: 1.3;
      border-left: 4px solid #0B9247;
      padding-left: 12px;
    }

    .step p {
      font-size: 15px;
      line-height: 1.7;
      color: #444;
    }

    /* === TOOLTIP === */
    .tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Montserrat', sans-serif;
      line-height: 1.5;
      max-width: 280px;
      display: none;
      z-index: 999;
    }

    /* === MUNICIPIOS === */
    path.municipio {
      stroke: #fff;
      stroke-width: 0.5;
      cursor: pointer;
      transition: fill 0.5s ease;
    }

    path.municipio:hover {
      stroke: #333;
      stroke-width: 1.5;
    }

    /* === PONTOS === */
    circle.ponto {
      stroke: #fff;
      stroke-width: 1.5;
      cursor: pointer;
    }

    /* === FOOTER === */
    .scrolly-footer {
      max-width: 700px;
      margin: 24px auto 0;
    }

    .chart-source {
      font-size: 11px;
      color: #999;
      margin-top: 12px;
    }

    .logo-container {
      text-align: center;
      margin-top: 24px;
    }

    .logo-container img {
      height: 40px;
    }

    /* === INDICADOR DE PROGRESSO === */
    .step-indicator {
      position: fixed;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 100;
    }

    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C0C0C0;
      transition: background 0.3s ease, transform 0.3s ease;
    }

    .step-dot.is-active {
      background: #0B9247;
      transform: scale(1.5);
    }

    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .scrolly-container { padding: 0; }

      .scrolly-header {
        padding: 0 16px;
        max-width: 100%;
      }

      .chart-title { font-size: 20px; }
      .chart-subtitle { font-size: 13px; }

      .scrolly {
        flex-direction: column;
      }

      .scrolly__map {
        flex: none;
        width: 100%;
        height: 50vh;
        position: sticky;
        top: 0;
        z-index: 1;
        background: #FFFFFF;
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      }

      .scrolly__text {
        flex: none;
        width: 100%;
        position: relative;
        z-index: 2;
        padding: 0 16px;
      }

      .step {
        min-height: 60vh;
        background: rgba(255,255,255,0.95);
        margin: 8px 0;
        padding: 24px 20px;
        border-radius: 8px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      }

      .step:first-child { margin-top: 16px; }
      .step:last-child { margin-bottom: 30vh; }

      .step h3 { font-size: 16px; }
      .step p { font-size: 14px; }

      .step-indicator { display: none; }

      .scrolly-footer { padding: 0 16px; }
    }
  </style>
</head>

    </div>

(function () {
  // --- 1. Popula header ---
  document.getElementById("chartTitle").innerHTML = CONFIG.titulo;
  document.getElementById("chartSubtitle").textContent = CONFIG.subtitulo;
  document.getElementById("chartSource").textContent = CONFIG.fonte;

  var mapArea = document.getElementById("mapArea");
  var legendEl = document.getElementById("legend");
  var tooltipEl = document.getElementById("tooltip");
  var textContainer = document.getElementById("scrollyText");
  var indicatorContainer = document.getElementById("stepIndicator");

  // --- 2. Verifica GeoJSON ---
  if (!CONFIG.geojson) {
    mapArea.innerHTML = '<p style="color:#FF161F; font-weight:600;">Erro: dados GeoJSON nao encontrados no CONFIG.</p>' +
      '<p style="color:#666; margin-top:8px;">Este e um template. Use o agente gerador para criar um infografico com dados reais.</p>';
    return;
  }

  // --- 3. Gera DOM dos capitulos ---
  CONFIG.capitulos.forEach(function (cap, i) {
    var step = document.createElement("div");
    step.className = "step";
    step.setAttribute("data-step", i);
    step.innerHTML = "<h3>" + cap.titulo + "</h3><p>" + cap.texto + "</p>";
    textContainer.appendChild(step);

    // Indicador de progresso (dots)
    var dot = document.createElement("div");
    dot.className = "step-dot";
    dot.setAttribute("data-dot", i);
    indicatorContainer.appendChild(dot);
  });

  // --- 4. Build data lookup ---
  var dataMap = new Map();
  CONFIG.dados.forEach(function (d) {
    dataMap.set(String(d.codigo_ibge), d);
  });

  // --- 5. Cria SVG + projecao ---
  var mapa = CONFIG.mapa;
  var geojson = CONFIG.geojson;
  var svgWidth = 800;
  var svgHeight = 600;

  var projection = d3.geoMercator().fitSize([svgWidth, svgHeight], geojson);
  var pathGen = d3.geoPath().projection(projection);

  var svg = d3.select("#mapArea").append("svg")
    .attr("viewBox", "0 0 " + svgWidth + " " + svgHeight)
    .attr("role", "img")
    .attr("aria-label", "Mapa scrollytelling do estado de Sao Paulo");

  // Grupo principal (recebe zoom transform)
  var g = svg.append("g");

  // --- 6. Desenha municipios ---
  g.selectAll("path.municipio")
    .data(geojson.features)
    .enter()
    .append("path")
    .attr("class", "municipio")
    .attr("d", pathGen)
    .attr("fill", mapa.cor_municipio_padrao)
    .attr("stroke", mapa.cor_borda)
    .attr("stroke-width", mapa.largura_borda)
    .on("mousemove", function (event, feat) {
      var featureId = String(feat.properties[CONFIG.geojson_campo_id] || "");
      var dados = dataMap.get(featureId);
      showTooltip(event, feat, dados);
    })
    .on("mouseleave", hideTooltip)
    .on("touchstart", function (event, feat) {
      event.preventDefault();
      var featureId = String(feat.properties[CONFIG.geojson_campo_id] || "");
      var dados = dataMap.get(featureId);
      showTooltip(event.touches[0], feat, dados);
    }, { passive: false });

  // --- 7. Cria pontos de interesse ---
  var pontosGroup = g.append("g").attr("class", "pontos-group").style("opacity", 0);

  if (CONFIG.pontos && CONFIG.pontos.length > 0) {
    CONFIG.pontos.forEach(function (p) {
      var coords = projection([p.lng, p.lat]);
      if (coords) {
        pontosGroup.append("circle")
          .attr("class", "ponto")
          .attr("cx", coords[0])
          .attr("cy", coords[1])
          .attr("r", p.raio || 5)
          .attr("fill", p.cor || "#FF161F")
          .datum(p);

        // Label do ponto
        if (p.label) {
          pontosGroup.append("text")
            .attr("class", "ponto-label")
            .attr("x", coords[0])
            .attr("y", coords[1] - (p.raio || 5) - 4)
            .attr("text-anchor", "middle")
            .attr("font-size", "10px")
            .attr("font-family", "'Montserrat', sans-serif")
            .attr("font-weight", "600")
            .attr("fill", "#1D1D1B")
            .text(p.label);
        }
      }
    });
  }

  // --- 8. Configura d3.zoom ---
  var zoomBehavior = d3.zoom()
    .scaleExtent([1, 20])
    .on("zoom", function (event) {
      g.attr("transform", event.transform);
      // Counter-scale strokes e pontos
      g.selectAll("path.municipio").attr("stroke-width", mapa.largura_borda / event.transform.k);
      g.selectAll("circle.ponto").attr("r", function (d) { return (d.raio || 5) / event.transform.k; });
      g.selectAll(".ponto-label").attr("font-size", (10 / event.transform.k) + "px");
    });

  svg.call(zoomBehavior);
  // Desabilita zoom manual do usuario (so programatico via scroll)
  svg.on(".zoom", null);

  // --- 9. Helper: format numbers ---
  function formatNumber(v) {
    if (v === null || v === undefined || v === "") return "\u2014";
    var num = Number(v);
    if (isNaN(num)) return String(v);
    return num.toLocaleString("pt-BR");
  }

  // --- 10. Tooltip ---
  function showTooltip(event, feature, dados) {
    var html = "";
    mapa.tooltip_campos.forEach(function (tc) {
      var val = "";
      if (dados && dados[tc.campo] !== undefined) {
        val = tc.formato === "numero" ? formatNumber(dados[tc.campo]) : String(dados[tc.campo]);
      } else if (feature.properties[tc.campo] !== undefined) {
        val = String(feature.properties[tc.campo]);
      } else if (tc.campo === "nome") {
        val = feature.properties.NM_MUN || feature.properties[CONFIG.geojson_campo_id] || "";
      } else {
        val = "\u2014";
      }
      if (tc === mapa.tooltip_campos[0]) {
        html += "<strong>" + val + "</strong>";
      } else {
        html += "<br>" + tc.rotulo + ": " + val;
      }
    });
    tooltipEl.innerHTML = html;
    tooltipEl.style.display = "block";
    var x = (event.clientX || event.pageX) + 12;
    var y = (event.clientY || event.pageY) - 28;
    tooltipEl.style.left = x + "px";
    tooltipEl.style.top = y + "px";
  }

  function hideTooltip() {
    tooltipEl.style.display = "none";
  }

  // --- 11. Funcoes de zoom ---
  function zoomToFull() {
    svg.transition().duration(750).call(
      zoomBehavior.transform,
      d3.zoomIdentity
    );
  }

  function zoomToFeatures(codigos) {
    var features = geojson.features.filter(function (f) {
      return codigos.indexOf(String(f.properties[CONFIG.geojson_campo_id])) !== -1;
    });
    if (features.length === 0) { zoomToFull(); return; }

    var collection = { type: "FeatureCollection", features: features };
    var bounds = pathGen.bounds(collection);
    var dx = bounds[1][0] - bounds[0][0];
    var dy = bounds[1][1] - bounds[0][1];
    var x = (bounds[0][0] + bounds[1][0]) / 2;
    var y = (bounds[0][1] + bounds[1][1]) / 2;
    var scale = Math.max(1, Math.min(12, 0.7 / Math.max(dx / svgWidth, dy / svgHeight)));
    var translate = [svgWidth / 2 - scale * x, svgHeight / 2 - scale * y];

    svg.transition().duration(750).call(
      zoomBehavior.transform,
      d3.zoomIdentity.translate(translate[0], translate[1]).scale(scale)
    );
  }

  // --- 12. Funcoes de cor ---
  function buildColorScale(coresConfig) {
    if (coresConfig.tipo_escala === "threshold") {
      var domain = coresConfig.faixas.slice(1).map(function (f) { return f.limite; });
      var range = coresConfig.faixas.map(function (f) { return f.cor; });
      return d3.scaleThreshold().domain(domain).range(range);
    } else if (coresConfig.tipo_escala === "sequential") {
      var values = CONFIG.dados.map(function (d) { return +d[coresConfig.campo_valor]; }).filter(function (v) { return !isNaN(v); });
      return d3.scaleLinear().domain([d3.min(values) || 0, d3.max(values) || 1]).range([coresConfig.cor_min, coresConfig.cor_max]);
    } else if (coresConfig.tipo_escala === "categorical") {
      return function (val) { return coresConfig.categorias[String(val)] || mapa.cor_sem_dados; };
    }
    return function () { return mapa.cor_municipio_padrao; };
  }

  function buildLegend(coresConfig) {
    legendEl.innerHTML = "";
    if (!coresConfig) return;

    if (coresConfig.tipo_escala === "threshold") {
      coresConfig.faixas.forEach(function (f) {
        var item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = '<div class="legend-swatch" style="background:' + f.cor + '"></div>' + f.rotulo;
        legendEl.appendChild(item);
      });
    } else if (coresConfig.tipo_escala === "categorical") {
      Object.keys(coresConfig.categorias).forEach(function (key) {
        var item = document.createElement("div");
        item.className = "legend-item";
        item.innerHTML = '<div class="legend-swatch" style="background:' + coresConfig.categorias[key] + '"></div>' + key;
        legendEl.appendChild(item);
      });
    } else if (coresConfig.tipo_escala === "sequential") {
      var values = CONFIG.dados.map(function (d) { return +d[coresConfig.campo_valor]; }).filter(function (v) { return !isNaN(v); });
      var grad = document.createElement("div");
      grad.style.cssText = "display:flex;align-items:center;gap:6px;font-size:11px;";
      grad.innerHTML = '<span>' + (d3.min(values) || 0) + '</span>' +
        '<div style="width:100px;height:12px;border-radius:2px;border:1px solid #ddd;background:linear-gradient(to right,' + coresConfig.cor_min + ',' + coresConfig.cor_max + ')"></div>' +
        '<span>' + (d3.max(values) || 0) + '</span>';
      legendEl.appendChild(grad);
    }
  }

  // --- 13. applyMapState — Core do scrollytelling ---
  var currentStep = -1;

  function applyMapState(stepIndex) {
    if (stepIndex === currentStep) return;
    currentStep = stepIndex;

    var cap = CONFIG.capitulos[stepIndex];
    if (!cap || !cap.mapState) return;
    var state = cap.mapState;

    // Interrompe transicoes em andamento
    svg.interrupt();
    g.selectAll("path.municipio").interrupt();
    pontosGroup.interrupt();

    // --- ZOOM ---
    if (state.zoom === "full") {
      zoomToFull();
    } else if (state.zoom && state.zoom.tipo === "municipios" && state.zoom.codigos) {
      zoomToFeatures(state.zoom.codigos);
    }

    // --- HIGHLIGHT ---
    if (state.highlight && state.highlight.codigos) {
      var highlightSet = new Set(state.highlight.codigos.map(String));
      var highlightCor = state.highlight.cor || "#0B9247";
      g.selectAll("path.municipio")
        .transition().duration(500)
        .attr("fill", function (feat) {
          var fid = String(feat.properties[CONFIG.geojson_campo_id] || "");
          return highlightSet.has(fid) ? highlightCor : mapa.cor_municipio_padrao;
        })
        .style("opacity", function (feat) {
          var fid = String(feat.properties[CONFIG.geojson_campo_id] || "");
          return highlightSet.has(fid) ? 1 : 0.3;
        });
      buildLegend(null);
    } else if (state.cores) {
      // --- COLORACAO COROPLETICA ---
      var colorScale = buildColorScale(state.cores);
      var campoValor = state.cores.campo_valor;
      g.selectAll("path.municipio")
        .transition().duration(500)
        .attr("fill", function (feat) {
          var fid = String(feat.properties[CONFIG.geojson_campo_id] || "");
          var dados = dataMap.get(fid);
          if (dados && dados[campoValor] !== undefined) {
            return state.cores.tipo_escala === "categorical" ? colorScale(dados[campoValor]) : colorScale(+dados[campoValor]);
          }
          return mapa.cor_sem_dados;
        })
        .style("opacity", 1);
      buildLegend(state.cores);
    } else {
      // --- RESET (cor padrao) ---
      g.selectAll("path.municipio")
        .transition().duration(500)
        .attr("fill", mapa.cor_municipio_padrao)
        .style("opacity", 1);
      buildLegend(null);
    }

    // --- PONTOS ---
    pontosGroup
      .transition().duration(400)
      .style("opacity", state.pontos ? 1 : 0);

    // --- INDICADOR DE PROGRESSO ---
    document.querySelectorAll(".step-dot").forEach(function (dot, i) {
      dot.classList.toggle("is-active", i === stepIndex);
    });
  }

  // --- 14. Inicializa scrollama ---
  var scroller = scrollama();

  scroller.setup({
    step: ".step",
    offset: 0.5,
    debug: false
  }).onStepEnter(function (response) {
    applyMapState(response.index);
    // Marca step ativo
    document.querySelectorAll(".step").forEach(function (s) {
      s.classList.remove("is-active");
    });
    response.element.classList.add("is-active");
  });

  // Resize handler
  window.addEventListener("resize", scroller.resize);

  // --- 15. Estado inicial ---
  applyMapState(0);
  var firstStep = document.querySelector(".step");
  if (firstStep) firstStep.classList.add("is-active");

})();
</script>

<!-- Auto-resize para iframe -->
<script>
function notifyHeight() {
  var h = document.documentElement.scrollHeight;
  window.parent.postMessage({ sentinel: 'agencia-sp', type: 'resize', height: h }, '*');
}
window.addEventListener('load', notifyHeight);
window.addEventListener('resize', notifyHeight);
setTimeout(notifyHeight, 2500);
</script>
</body>
</html>
