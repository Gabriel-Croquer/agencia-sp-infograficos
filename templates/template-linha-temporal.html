<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evolucao da proficiencia media no Saresp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #FFFFFF;
      color: #1D1D1B;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .chart-container {
      width: 100%;
      max-width: 960px;
    }

    .chart-title {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: #1D1D1B;
    }

    .chart-title .destaque {
      color: #0B9247;
    }

    .chart-subtitle {
      font-size: 0.95rem;
      font-weight: 400;
      color: #555;
      margin-bottom: 24px;
    }

    .chart-wrapper {
      position: relative;
      width: 100%;
    }

    svg.line-chart {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .chart-source {
      font-size: 0.75rem;
      color: #888;
      margin-top: 8px;
      text-align: right;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 28px;
      margin-bottom: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.25s;
    }

    .legend-line {
      width: 28px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .legend-line.dashed {
      background: repeating-linear-gradient(
        90deg,
        var(--color) 0,
        var(--color) 6px,
        transparent 6px,
        transparent 10px
      );
    }

    .legend-line.solid {
      background: var(--color);
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #1D1D1B;
      color: #fff;
      font-size: 0.78rem;
      line-height: 1.5;
      padding: 8px 12px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 10;
    }

    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #1D1D1B;
    }

    /* Accessibility: visually hidden table */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    @media (max-width: 600px) {
      .chart-title { font-size: 1.15rem; }
      .chart-subtitle { font-size: 0.82rem; }
      .legend { gap: 10px 18px; }
      .legend-item { font-size: 0.75rem; }
    }
  </style>
</head>
<body>

<div class="chart-container" role="figure" aria-label="Grafico de linhas mostrando a evolucao da proficiencia media no Saresp">
  <h1 class="chart-title" id="chart-title"></h1>
  <p class="chart-subtitle" id="chart-subtitle"></p>
  <div class="legend" id="legend" role="list" aria-label="Legenda das series"></div>
  <div class="chart-wrapper">
    <svg class="line-chart" id="chart" aria-hidden="true"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <p class="chart-source" id="chart-source"></p>
</div>

<!-- Tabela acessivel oculta -->
<table class="sr-only" id="data-table" aria-label="Dados do grafico de proficiencia media no Saresp">
  <caption>Evolucao da proficiencia media no Saresp - Rede Estadual de SP</caption>
</table>

<script>
// ========== CONFIG EDITAVEL ==========
const CONFIG = {
  titulo: 'Evolucao da <span class="destaque">proficiencia media</span> no Saresp - Rede Estadual de SP',
  subtitulo: 'Serie historica 2015-2025 por disciplina e ano escolar',
  fonte: 'Fonte: Saresp 2025',
  eixo_y_min: 150,
  eixo_y_max: 270,
  series: [
    {
      nome: 'LP - 5o Ano',
      cor: '#0B9247',
      dash: 'solid',
      dados: [
        {ano: 2015, valor: 212.9}, {ano: 2016, valor: 218.7}, {ano: 2017, valor: 214.5},
        {ano: 2018, valor: 217.1}, {ano: 2019, valor: 216.8}, {ano: 2021, valor: 198.3},
        {ano: 2022, valor: 197.0}, {ano: 2023, valor: 200.7}, {ano: 2024, valor: 206.8},
        {ano: 2025, valor: 213.9}
      ]
    },
    {
      nome: 'LP - 9o Ano',
      cor: '#0B9247',
      dash: 'dashed',
      dados: [
        {ano: 2015, valor: 240.8}, {ano: 2016, valor: 237.4}, {ano: 2017, valor: 242.5},
        {ano: 2018, valor: 249.4}, {ano: 2019, valor: 249.6}, {ano: 2021, valor: 241.4},
        {ano: 2022, valor: 244.2}, {ano: 2023, valor: 234.4}, {ano: 2024, valor: 235.7},
        {ano: 2025, valor: 243.0}
      ]
    },
    {
      nome: 'Mat - 5o Ano',
      cor: '#034EA2',
      dash: 'solid',
      dados: [
        {ano: 2015, valor: 223.8}, {ano: 2016, valor: 222.6}, {ano: 2017, valor: 223.9},
        {ano: 2018, valor: 227.5}, {ano: 2019, valor: 231.3}, {ano: 2021, valor: 210.4},
        {ano: 2022, valor: 211.3}, {ano: 2023, valor: 215.3}, {ano: 2024, valor: 222.5},
        {ano: 2025, valor: 236.3}
      ]
    },
    {
      nome: 'Mat - 9o Ano',
      cor: '#034EA2',
      dash: 'dashed',
      dados: [
        {ano: 2015, valor: 258.7}, {ano: 2016, valor: 251.1}, {ano: 2017, valor: 257.1},
        {ano: 2018, valor: 255.7}, {ano: 2019, valor: 259.9}, {ano: 2021, valor: 246.8},
        {ano: 2022, valor: 248.6}, {ano: 2023, valor: 246.3}, {ano: 2024, valor: 248.5},
        {ano: 2025, valor: 260.3}
      ]
    }
  ]
};
// ========== FIM CONFIG ==========

(function () {
  const PADDING = { top: 20, right: 30, bottom: 50, left: 55 };
  const SVG_WIDTH = 960;
  const SVG_HEIGHT = 460;
  const chartW = SVG_WIDTH - PADDING.left - PADDING.right;
  const chartH = SVG_HEIGHT - PADDING.top - PADDING.bottom;

  // Collect all years
  const allYears = [...new Set(CONFIG.series.flatMap(s => s.dados.map(d => d.ano)))].sort((a, b) => a - b);
  const yMin = CONFIG.eixo_y_min;
  const yMax = CONFIG.eixo_y_max;

  // Scales
  function xScale(ano) {
    const idx = allYears.indexOf(ano);
    return PADDING.left + (idx / (allYears.length - 1)) * chartW;
  }

  function yScale(val) {
    return PADDING.top + chartH - ((val - yMin) / (yMax - yMin)) * chartH;
  }

  // Populate title, subtitle, source
  document.getElementById('chart-title').innerHTML = CONFIG.titulo;
  document.getElementById('chart-subtitle').textContent = CONFIG.subtitulo;
  document.getElementById('chart-source').textContent = CONFIG.fonte;

  // SVG setup
  const svg = document.getElementById('chart');
  svg.setAttribute('viewBox', `0 0 ${SVG_WIDTH} ${SVG_HEIGHT}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  const ns = 'http://www.w3.org/2000/svg';

  function svgEl(tag, attrs) {
    const el = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    return el;
  }

  // Grid + Axes
  // Y grid lines and labels
  const yTicks = [];
  const yStep = 20;
  for (let v = yMin; v <= yMax; v += yStep) yTicks.push(v);

  yTicks.forEach(v => {
    const y = yScale(v);
    // grid line
    svg.appendChild(svgEl('line', {
      x1: PADDING.left, y1: y, x2: SVG_WIDTH - PADDING.right, y2: y,
      stroke: '#E0E0E0', 'stroke-width': 1
    }));
    // label
    const txt = svgEl('text', {
      x: PADDING.left - 10, y: y + 4,
      'text-anchor': 'end', 'font-size': '12', fill: '#888',
      'font-family': 'Montserrat, sans-serif'
    });
    txt.textContent = v;
    svg.appendChild(txt);
  });

  // X axis labels
  allYears.forEach(ano => {
    const x = xScale(ano);
    // tick
    svg.appendChild(svgEl('line', {
      x1: x, y1: PADDING.top + chartH, x2: x, y2: PADDING.top + chartH + 6,
      stroke: '#888', 'stroke-width': 1
    }));
    const txt = svgEl('text', {
      x: x, y: PADDING.top + chartH + 24,
      'text-anchor': 'middle', 'font-size': '12', fill: '#888',
      'font-family': 'Montserrat, sans-serif'
    });
    txt.textContent = ano;
    svg.appendChild(txt);
  });

  // Axis lines
  svg.appendChild(svgEl('line', {
    x1: PADDING.left, y1: PADDING.top, x2: PADDING.left, y2: PADDING.top + chartH,
    stroke: '#ccc', 'stroke-width': 1
  }));
  svg.appendChild(svgEl('line', {
    x1: PADDING.left, y1: PADDING.top + chartH, x2: SVG_WIDTH - PADDING.right, y2: PADDING.top + chartH,
    stroke: '#ccc', 'stroke-width': 1
  }));

  // Draw series
  const seriesGroups = [];

  CONFIG.series.forEach((serie, si) => {
    const g = svgEl('g', { 'data-series': si });
    g.style.transition = 'opacity 0.25s';

    // Build path
    const points = serie.dados.map(d => ({ x: xScale(d.ano), y: yScale(d.valor), ano: d.ano, valor: d.valor }));
    const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');

    const path = svgEl('path', {
      d: pathD,
      fill: 'none',
      stroke: serie.cor,
      'stroke-width': 2.5,
      'stroke-linejoin': 'round',
      'stroke-linecap': 'round'
    });

    if (serie.dash === 'dashed') {
      path.setAttribute('stroke-dasharray', '8 5');
    }

    // Animation: stroke-dashoffset
    const pathLength = estimatePathLength(points);
    path.style.strokeDashoffset = pathLength;
    // We use a secondary dasharray for animation on solid lines
    if (serie.dash === 'solid') {
      path.setAttribute('stroke-dasharray', pathLength);
    } else {
      // For dashed, we animate with a mask trick using a clip-path
      // Simpler: we animate opacity per point instead
    }

    g.appendChild(path);

    // Draw points
    points.forEach((p, pi) => {
      const circle = svgEl('circle', {
        cx: p.x, cy: p.y, r: 4.5,
        fill: '#FFFFFF', stroke: serie.cor, 'stroke-width': 2.5
      });
      circle.style.transition = 'r 0.15s';
      g.appendChild(circle);

      // Invisible larger hit area
      const hitArea = svgEl('circle', {
        cx: p.x, cy: p.y, r: 14,
        fill: 'transparent', cursor: 'pointer',
        'aria-label': `${serie.nome}, ${p.ano}: ${p.valor}`,
        tabindex: '0', role: 'img'
      });

      hitArea.addEventListener('mouseenter', () => showTooltip(serie.nome, p.ano, p.valor, p.x, p.y));
      hitArea.addEventListener('mouseleave', hideTooltip);
      hitArea.addEventListener('focus', () => showTooltip(serie.nome, p.ano, p.valor, p.x, p.y));
      hitArea.addEventListener('blur', hideTooltip);

      hitArea.addEventListener('mouseenter', () => { circle.setAttribute('r', '6.5'); });
      hitArea.addEventListener('mouseleave', () => { circle.setAttribute('r', '4.5'); });

      g.appendChild(hitArea);
    });

    svg.appendChild(g);
    seriesGroups.push(g);
  });

  // Animate lines
  function animateLines() {
    CONFIG.series.forEach((serie, si) => {
      const g = seriesGroups[si];
      const path = g.querySelector('path');
      const points = serie.dados.map(d => ({ x: xScale(d.ano), y: yScale(d.valor) }));
      const len = estimatePathLength(points);

      if (serie.dash === 'solid') {
        path.setAttribute('stroke-dasharray', len);
        path.setAttribute('stroke-dashoffset', len);
        requestAnimationFrame(() => {
          path.style.transition = 'stroke-dashoffset 1.2s ease-out';
          path.setAttribute('stroke-dashoffset', '0');
        });
      } else {
        // For dashed lines, overlay a solid "reveal" line that shrinks
        // Simpler approach: animate with clip rect
        const clipId = 'clip-reveal-' + si;
        const clipPath = svgEl('clipPath', { id: clipId });
        const clipRect = svgEl('rect', {
          x: PADDING.left, y: 0, width: 0, height: SVG_HEIGHT
        });
        clipPath.appendChild(clipRect);
        svg.insertBefore(clipPath, svg.firstChild);
        g.setAttribute('clip-path', `url(#${clipId})`);

        requestAnimationFrame(() => {
          clipRect.style.transition = 'width 1.2s ease-out';
          clipRect.setAttribute('width', SVG_WIDTH);
        });
      }
    });
  }

  // Trigger animation on load
  requestAnimationFrame(animateLines);

  function estimatePathLength(pts) {
    let len = 0;
    for (let i = 1; i < pts.length; i++) {
      len += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
    }
    return Math.ceil(len);
  }

  // Tooltip
  const tooltip = document.getElementById('tooltip');

  function showTooltip(nome, ano, valor, px, py) {
    tooltip.innerHTML = `<strong>${nome}</strong><br>Ano: ${ano}<br>Valor: ${valor.toFixed(1)}`;
    tooltip.style.opacity = '1';

    // Position relative to chart wrapper
    const svgRect = svg.getBoundingClientRect();
    const wrapperRect = svg.parentElement.getBoundingClientRect();
    const scaleX = svgRect.width / SVG_WIDTH;
    const scaleY = svgRect.height / SVG_HEIGHT;

    const left = (px * scaleX) + (svgRect.left - wrapperRect.left);
    const top = (py * scaleY) + (svgRect.top - wrapperRect.top);

    tooltip.style.left = left + 'px';
    tooltip.style.top = (top - 50) + 'px';
    tooltip.style.transform = 'translateX(-50%)';

    // Highlight the series
    highlightSeries(CONFIG.series.findIndex(s => s.nome === nome));
  }

  function hideTooltip() {
    tooltip.style.opacity = '0';
    resetHighlight();
  }

  // Highlight / dim
  function highlightSeries(idx) {
    seriesGroups.forEach((g, i) => {
      g.style.opacity = (i === idx) ? '1' : '0.2';
    });
    document.querySelectorAll('.legend-item').forEach((el, i) => {
      el.style.opacity = (i === idx) ? '1' : '0.4';
    });
  }

  function resetHighlight() {
    seriesGroups.forEach(g => { g.style.opacity = '1'; });
    document.querySelectorAll('.legend-item').forEach(el => { el.style.opacity = '1'; });
  }

  // Legend
  const legendEl = document.getElementById('legend');

  CONFIG.series.forEach((serie, si) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.setAttribute('role', 'listitem');
    item.setAttribute('tabindex', '0');
    item.setAttribute('aria-label', `Serie: ${serie.nome}`);

    const line = document.createElement('span');
    line.className = `legend-line ${serie.dash}`;
    line.style.setProperty('--color', serie.cor);

    const label = document.createElement('span');
    label.textContent = serie.nome;
    label.style.color = serie.cor;

    item.appendChild(line);
    item.appendChild(label);

    item.addEventListener('mouseenter', () => highlightSeries(si));
    item.addEventListener('mouseleave', resetHighlight);
    item.addEventListener('focus', () => highlightSeries(si));
    item.addEventListener('blur', resetHighlight);

    legendEl.appendChild(item);
  });

  // Accessible data table
  const table = document.getElementById('data-table');
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  const thAno = document.createElement('th');
  thAno.textContent = 'Ano';
  thAno.setAttribute('scope', 'col');
  headerRow.appendChild(thAno);

  CONFIG.series.forEach(s => {
    const th = document.createElement('th');
    th.textContent = s.nome;
    th.setAttribute('scope', 'col');
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  allYears.forEach(ano => {
    const tr = document.createElement('tr');
    const tdAno = document.createElement('td');
    tdAno.textContent = ano;
    tr.appendChild(tdAno);

    CONFIG.series.forEach(s => {
      const td = document.createElement('td');
      const d = s.dados.find(d => d.ano === ano);
      td.textContent = d ? d.valor.toFixed(1) : '-';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
})();
</script>
